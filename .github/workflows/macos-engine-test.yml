name: TEMP - verify macOS engine build

# TEMPORARY verification workflow. Builds the bridge-patched macOS engine in
# isolation (the same steps as release.yml's engine-macos job) so we can prove the
# macOS path works in real CI before trusting it in the release pipeline. Triggers
# automatically on push to this branch. DELETE this file once the build is green.

on:
  push:
    branches: [ci/verify-macos-engine]
  workflow_dispatch:

env:
  ZANDRONUM_REF: ZA_3.2.1
  MACOS_BUILD_REPO: rc4l/zandronum-macos-compile
  MACOS_BUILD_REF: main

jobs:
  engine-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout zandronum-mcp (overlay + apply-bridge + packager)
        uses: actions/checkout@v4
        with:
          path: mcp

      - name: Checkout the macOS build system
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MACOS_BUILD_REPO }}
          ref: ${{ env.MACOS_BUILD_REF }}
          path: engine

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rosetta 2 (needed to build/run the x86_64 FMOD engine)
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Build stock Zandronum (deps from source + hg source + CMake)
        working-directory: engine
        env:
          SOUND: "1"
          ZANDRONUM_REF: ${{ env.ZANDRONUM_REF }}
        run: ./build.sh

      - name: Apply the MCP bridge overlay to the source
        working-directory: engine
        run: node ../mcp/engine-bridge/apply-bridge.mjs --src src/zandronum

      - name: Rebuild the patched engine
        working-directory: engine
        env:
          SOUND: "1"
          ZANDRONUM_REF: ${{ env.ZANDRONUM_REF }}
        run: ./build.sh

      - name: Package the runnable, relocatable engine
        working-directory: engine
        run: bash ../mcp/.github/scripts/package-macos-engine.sh "$PWD" "$GITHUB_WORKSPACE/zandronum-mcp-engine-macos-x64.zip"

      - name: Upload the engine as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zandronum-mcp-engine-macos-x64
          path: zandronum-mcp-engine-macos-x64.zip
          if-no-files-found: error
