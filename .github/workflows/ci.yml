name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run coverage
      # Note: the e2e smoke (real zandronum.exe + bridge patch) runs on a
      # separate Windows job that is intentionally NOT part of coverage gating.
